
<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N Cut AI - Professional Video Editor</title>
    <!-- Ampidirina eto ny motera FFmpeg -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="logo">🎬 N Cut AI</div>
    <p class="subtitle">Professional AI Video Generator</p>
</div>

<div class="card">
    <h2>Create Video</h2>
    
    <!-- Fampidirana Video avy amin'ny Honor 8X -->
    <input type="file" id="video-input" accept="video/*" style="display: none;">
    <button onclick="document.getElementById('video-input').click()">📁 Safidio ny Video</button>

    <textarea id="prompt" placeholder="Soraty eto ny hevitrao ho an'ny vidéo AI..."></textarea>
    
    <!-- Preview an'ilay Video -->
    <div id="video-container" style="margin-top: 15px;">
        <video id="resultVideo" controls style="width:100%; display:none; border-radius: 10px;"></video>
    </div>

    <p id="status" style="color: #38bdf8; font-weight: bold;"></p>

    <div class="button-group">
        <button id="process-btn">🚀 Generate / Process Video</button>
        <button id="export-btn" style="display: none; background: #10b981;">📥 Download Video</button>
    </div>
</div>

<div class="footer">
    Powered by AI | N Cut AI 2024
</div>

<script src="script.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
      </html>
