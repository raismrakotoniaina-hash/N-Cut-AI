
<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Malagasy Video Generator</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        textarea { width: 100%; height: 80px; border-radius: 8px; border: none; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        button:disabled { background: #555; }
        #status { margin: 15px 0; font-size: 0.9em; color: #bbb; }
        video { width: 100%; border-radius: 10px; display: none; margin-top: 15px; background: black; }
        .ads-box { margin-top: 20px; padding: 10px; border: 1px dashed #555; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Video Malagasy</h2>
    <p>Soraty izay tianao ho hita (ohatra: "A lemur in a Malagasy forest")</p>
    
    <textarea id="prompt" placeholder="Manorata eto..."></textarea>
    
    <button id="gen-btn">⚡ GENERATE VIDEO (AI)</button>
    
    <div id="status">Vonona...</div>
    
    <video id="resultVideo" controls></video>
    
    <button id="download-btn" style="display:none; background: #28a745;">📥 Ampidino ny Video</button>

    <div class="ads-box" id="ads-section">
        <p>Mila credit? Mijery Pub hahazoana 1 Free Video</p>
        <button onclick="showFakeAd()" style="background: #6c757d;">📺 Mijery Pub</button>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    // SOLOY NY TOKEN-NAO AVY ANY AMIN'NY HUGGING FACE ETO
    const HF_TOKEN = "HF_ASIANO_NY_TOKEN_NAO_ETO"; 
    const AI_MODEL = "damo-vilab/model-scope-text-to-video";

    const genBtn = document.getElementById('gen-btn');
    const status = document.getElementById('status');
    const resultVideo = document.getElementById('resultVideo');
    const promptInput = document.getElementById('prompt');
    const dlBtn = document.getElementById('download-btn');

    let credits = 0; // Ohatra amin'ny rafitra credit

    // --- 2. FONCTION TEXT-TO-VIDEO ---
    genBtn.onclick = async () => {
        const text = promptInput.value;
        if (!text) { alert("Manorata hafatra kely aloha!"); return; }
        
        // Fanamarihana: Eto ianao afaka manisy "Translator" raha teny malagasy madiodio no fidirana
        
        genBtn.disabled = true;
        status.innerText = "⏳ Mifandray amin'ny AI (mety haharitra 30s-1mn)...";
        resultVideo.style.display = "none";
        dlBtn.style.display = "none";

        try {
            const response = await fetch(
                `https://api-inference.huggingface.co/models/${AI_MODEL}`,
                {
                    headers: { 
                        Authorization: `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                }
            );

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Busy ny AI na diso ny Token.");
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            // Mampiseho ny valiny
            resultVideo.src = url;
            resultVideo.style.display = "block";
            status.innerText = "✅ Vita soa aman-tsara!";
            
            // Fandaharana ny bokotra ampidirina
            dlBtn.style.display = "block";
            dlBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ai-video-malagasy.mp4';
                a.click();
            };

        } catch (e) {
            status.innerText = "❌ Hadisoana: " + e.message;
            console.error(e);
        } finally {
            genBtn.disabled = false;
        }
    };

    // --- 3. LOGIC AMIN'NY DOKAMBAROTRA (SIMULATION) ---
    function showFakeAd() {
        status.innerText = "📺 Mandray dokambarotra... (Simulation)";
        setTimeout(() => {
            alert("Misaotra nijery! Nahazo '1 Free Credit' ianao.");
            credits += 1;
            status.innerText = `Anananao: ${credits} credit(s)`;
        }, 5000); // 5 segondra ohatra
    }
</script>

</body>
</html>
