<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. ANARANA EO AMBONY -->
    <title>N-Cut AI Malagasy</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #222; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; border: 1px solid #333; }
        textarea { width: 90%; height: 70px; margin-bottom: 10px; border-radius: 8px; padding: 10px; border: 1px solid #444; background: #333; color: white; }
        button { background: #e91e63; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        #status { margin-top: 15px; color: #ffeb3b; font-size: 14px; }
        video { width: 100%; display: none; margin-top: 15px; border-radius: 10px; background: #000; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <!-- 2. ANARANA EO AMIN'NY INTERFACE -->
    <h2 style="color: #e91e63;">N-CUT AI</h2>
    <p style="font-size: 13px; color: #bbb;">Mpamadika soratra ho horonantsary</p>
    
    <textarea id="prompt" placeholder="Ohatra: A beautiful sunrise in Madagascar..."></textarea>
    
    <button id="gen-btn">GÉNÉRER VIDEO</button>
    
    <div id="status">Vonona ny mpamokatra...</div>
    
    <video id="resultVideo" controls></video>

    <!-- Bokotra fampidinana (download) -->
    <button id="dl-btn" style="display:none; background: #2196f3; margin-top: 10px;">📥 AMPIDINO NY VIDEO</button>
</div>

<div class="footer">N-Cut v1.0 - Malagasy AI Project</div>

<script>
    const HF_TOKEN = "HF_TOKEN_NAO_ETO"; // Soloy ny Token-nao
    const genBtn = document.getElementById('gen-btn');
    const dlBtn = document.getElementById('dl-btn');
    const status = document.getElementById('status');
    const resultVideo = document.getElementById('resultVideo');
    const promptInput = document.getElementById('prompt');

    genBtn.onclick = async () => {
        const text = promptInput.value;
        if (!text) { alert("Manorata zavatra aloha!"); return; }

        status.innerText = "⏳ N-CUT AI eo am-piasana... (Miandrasa kely)";
        genBtn.disabled = true;
        resultVideo.style.display = "none";
        dlBtn.style.display = "none";

        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/damo-vilab/model-scope-text-to-video",
                {
                    headers: { 
                        Authorization: `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                }
            );

            if (!response.ok) throw new Error("Feno ny server na diso ny Token.");

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            resultVideo.src = url;
            resultVideo.style.display = "block";
            status.innerText = "✅ Vita soa aman-tsara!";

            // 3. ANARANA REHEFA AMPIDININA (DOWNLOAD)
            dlBtn.style.display = "block";
            dlBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'n-cut-ai-video.mp4'; // Eto no ovana ny anaran'ny rakitra (file)
                a.click();
            };

        } catch (e) {
            status.innerText = "❌ Hadisoana: " + e.message;
        } finally {
            genBtn.disabled = false;
        }
    };
</script>

</body>
</html>
