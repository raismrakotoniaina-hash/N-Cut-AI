<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>N-Cut AI Video Generator</title>

<style>
body {
    background:#121212;
    color:white;
    font-family:sans-serif;
    padding:20px;
    text-align:center;
}

.box {
    background:#222;
    padding:20px;
    border-radius:12px;
    max-width:450px;
    margin:auto;
}

select, textarea {
    width:90%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    background:#333;
    color:white;
    border:1px solid #555;
}

textarea {
    height:100px;
}

button {
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#e91e63;
    color:white;
    border:0;
    border-radius:10px;
    font-weight:bold;
}

#status {
    margin-top:15px;
    color:#ffeb3b;
}

video {
    width:100%;
    margin-top:15px;
    border-radius:10px;
    display:none;
}
</style>

</head>

<body>

<div class="box">

<h2 style="color:#e91e63;">
N-CUT AI
</h2>

<p>
🌍 AI Video Generator
</p>


<h4>👤 Safidio Avatar</h4>

<select id="avatar">
<option value="malagasy_female">
🇲🇬 Vehivavy Malagasy mpanolotra vaovao
</option>

<option value="malagasy_male">
🇲🇬 Lehilahy Malagasy
</option>

<option value="foreign_female">
🌍 Vehivavy vahiny mpanolotra
</option>

<option value="foreign_male">
🌍 Lehilahy vahiny
</option>

</select>


<h4>🗣️ Safidio fiteny</h4>

<select id="language">

<option value="mg">
🇲🇬 Malagasy
</option>

<option value="fr">
🇫🇷 Français
</option>

<option value="en">
🇬🇧 English
</option>

</select>


<textarea id="prompt"
placeholder="Soraty ny hevitrao eto...">
</textarea>


<button id="generate-btn">
🎬 HAMORONA VIDEO
</button>


<div id="status">
Vonona ny N-Cut AI
</div>


<video id="resultVideo" controls></video>


</div>


<script src="script.js"></script>

</body>
</html>
