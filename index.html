<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N Cut AI Test</title>
    
    <!-- 1. Script fiarovana -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/coi-serviceworker/0.1.7/coi-serviceworker.min.js"></script>
    
    <!-- 2. Motera FFmpeg -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { background: #7c3aed; color: white; padding: 15px; border: none; border-radius: 10px; width: 90%; margin: 10px 0; font-size: 16px; font-weight: bold; }
        #status { color: #38bdf8; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎬 N Cut AI</h1>
    <p id="status">Andrasana ny script...</p>
    
    <textarea id="prompt" style="width: 90%; height: 60px;" placeholder="Soraty eto..."></textarea>
    
    <button id="test-btn">Tsindrio ity raha hanandrana (Alert)</button>
    <button id="text-to-video-btn">🚀 Text to Video</button>

    <!-- Nampidirina mivantana eto ny script mba ho azo antoka -->
    <script>
        // Fitsapana voalohany
        window.onload = function() {
            document.getElementById('status').innerText = "✅ Script efa miasa (Honor 8X)";
            alert("Mandeha ny Script!");
        };

        // Rehefa tsindrina ny bokotra Test
        document.getElementById('test-btn').onclick = function() {
            alert("Bokotra TEST mandeha!");
        };

        // Rehefa tsindrina ny Text-to-Video
        document.getElementById('text-to-video-btn').onclick = function() {
            alert("Eo am-panombohana ny Video Editing...");
            document.getElementById('status').innerText = "⚡ Miomana ny FFmpeg...";
        };
    </script>

    <!-- Script avy any ivelany (raha mbola te hampiasa script.js) -->
    <script src="script.js?v=2"></script>
</body>
</html>
