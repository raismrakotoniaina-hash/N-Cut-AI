<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N Cut AI - Professional Video Editor</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="logo">🎬 N Cut AI</div>
    <p class="subtitle">Professional AI Video Generator</p>
</div>

<div class="card">
    <h2>Create Video</h2>
    
    <!-- Eto no asiana ny hevitra (AI Prompt) -->
    <textarea id="prompt" placeholder="Soraty eto ny hevitrao ho an'ny vidéo AI..."></textarea>

    <!-- Preview an'ilay Video -->
    <div id="video-container">
        <video id="resultVideo" controls style="width:100%; display:none; border-radius: 10px; margin-bottom: 15px;"></video>
    </div>

    <p id="status" style="color: #38bdf8; font-weight: bold; font-size: 14px;"></p>

    <!-- IREO BOKOTRA REHETRA -->
<div class="button-group">
    <!-- Safidio ny Video -->
    <input type="file" id="video-input" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
    <button onclick="document.getElementById('video-input').click()" style="background: #334155;">📁 Safidio ny Video</button>

    <!-- Text to Video -->
    <button id="text-to-video-btn" onclick="handleTextToVideo()" style="background: #7c3aed;">✍️ Text To Video</button>

    <!-- Image to Video -->
    <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="handleImageSelect(this)">
    <button id="image-to-video-btn" onclick="document.getElementById('image-input').click()" style="background: #2563eb;">🖼️ Image To Video</button>

    <!-- Generate Video -->
    <button id="process-btn" onclick="handleTextToVideo()" style="background: #f59e0b; margin-top: 10px;">🚀 Generate Video</button>
    
    <!-- Download -->
    <button id="export-btn" style="display: none; background: #10b981;">📥 Download Video</button>
</div>
</div>

<div class="footer">
    Powered by AI | N Cut AI
</div>

<script src="script.js"></script>
</body>
</html>
