<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N Cut AI - Professional Editor</title>
    
    <!-- Script fiarovana ho an'ny Honor 8X -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/coi-serviceworker/0.1.7/coi-serviceworker.min.js"></script>
    <!-- Motera FFmpeg -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS fanampiny mba ho tsara ny fijery amin'ny finday */
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; }
        .btn-main { background: linear-gradient(45deg, #7c3aed, #2563eb); }
        .btn-sec { background: #334155; }
        #status { font-size: 14px; text-align: center; color: #38bdf8; min-height: 20px; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; border: 2px solid #334155; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎬 N Cut AI</div>
    <p class="subtitle">AI Video Generation tool</p>
</div>

<div class="card">
    <p id="status">✅ System Ready</p>
    
    <textarea id="prompt" placeholder="Soraty eto ny hevitrao ho an'ny vidéo AI..."></textarea>
    
    <div class="btn-group">
        <!-- BOKOTRA GENERATE (Ilay lehibe indrindra) -->
        <button id="generate-btn" class="btn-main" style="background: linear-gradient(45deg, #f59e0b, #d97706); margin-bottom: 15px; font-size: 18px;">
            🚀 GENERATE VIDEO
        </button>

        <hr style="border: 0.5px solid #334155; width: 100%; margin: 10px 0;">

        <!-- Safidy hafa -->
        <button id="txt-vid-btn" class="btn-sec">✍️ Text to Video (Quick)</button>
        
        <input type="file" id="img-input" accept="image/*" style="display:none;">
        <button onclick="document.getElementById('img-input').click()" class="btn-sec">🖼️ Image to Video</button>
        
        <input type="file" id="vid-input" accept="video/*" style="display:none;" onchange="handleLocalVideo(this)">
        <button onclick="document.getElementById('vid-input').click()" class="btn-sec">📁 Edit Local Video</button>
    </div>

    <!-- Preview -->
    <video id="resultVideo" controls style="display:none;"></video>
    <button id="download-btn" style="display:none; background:#10b981; margin-top:10px; width:100%;">📥 Download Video</button>
</div>

<div class="footer">Powered by AI | N Cut</div>

<script src="script.js"></script>

<script>
    // Fitsapana raha toa ka mbola misy olana ny script.js ivelany
    window.onload = function() {
        console.log("Interface Loaded");
        document.getElementById('status').innerText = "✅ Rafitra vonona (System Ready)";
    };
</script>

</body>
</html>
</body>
</html>
